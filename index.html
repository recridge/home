<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rec Ridge Studios - Coming Soon</title>

  <style>
    /* Smooth Scrolling */
    html {
      scroll-behavior: smooth;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
      background-color: #ff6f00; /* Vibrant Orange */
      color: #ffffff;
      text-align: center;
    }

    /* Interactive Entrance Overlay */
    #enter-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 4.5s ease-out;
    }

    #enter-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .enter-text {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.8);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Fullscreen Sections */
    section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      position: relative;
    }

    /* MAIN HERO SECTION */
    h1 {
      font-size: 4rem;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
    }

    /* Buttons Style */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: "Comic Sans MS", "Comic Sans", cursive, sans-serif;
      color: #ffffff;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
    }

    .btn-discord {
      background-color: #5865F2; /* Official Blurple */
    }

    .btn-discord:hover {
      background-color: #4752C4;
    }

    .svg-icon {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    /* Scroll Down Arrow Indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 20px;
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.9;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    /* SOCIALS SECTION */
    #socials {
      background-color: #e66400; /* Slightly darker orange for section contrast */
    }

    h2 {
      font-size: 2.8rem;
      margin-bottom: 35px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
    }

    .socials-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }

    .social-card {
      background: rgba(0, 0, 0, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: 20px;
      border-radius: 16px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #ffffff;
      transition: all 0.2s ease;
    }

    .social-card:hover {
      background: rgba(0, 0, 0, 0.25);
      border-color: #ffffff;
      transform: translateY(-5px);
    }

    .social-card .svg-icon {
      width: 40px;
      height: 40px;
    }

    .social-card span {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .social-card small {
      opacity: 0.8;
      font-size: 0.9rem;
    }

    footer {
      font-size: 1.1rem;
      padding: 30px 20px;
      background-color: #e66400;
      opacity: 0.9;
    }
  </style>
</head>

  <footer>
    <p>&copy; Rec Ridge Studios, 2026</p>
  </footer>

  <script>
    const overlay = document.getElementById('enter-overlay');
    const audio = document.getElementById('bg-audio');

    overlay.addEventListener('click', function() {
      // 1. Play audio immediately on interaction
      audio.play().catch(e => console.log('Audio playback blocked:', e));

      // 2. Trigger the 4.5 second fade out
      overlay.classList.add('fade-out');

      // 3. Remove overlay from DOM once animation finishes
      setTimeout(() => {
        overlay.style.display = 'none';
      }, 4500);
    });
  </script>
